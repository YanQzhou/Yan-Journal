<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>📖 砚清舟记账簿</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --income-bg: #f1f8f4;
            --income-border: #4caf84;
            --income-accent: #2e7d52;
            --income-light: #e8f5e9;
            --expense-bg: #fef7f4;
            --expense-border: #e8836b;
            --expense-accent: #c0392b;
            --expense-light: #fef0ed;
            --balance-bg: #f4f7fc;
            --balance-border: #5b8cc9;
            --balance-accent: #1a4f8a;
            --balance-light: #e8f0fa;
            --bg: #f5f2ed;
            --card-bg: #ffffff;
            --text: #3d342b;
            --text-secondary: #6b5f52;
            --text-light: #8c7b6b;
            --shadow: 0 2px 12px rgba(60, 40, 20, 0.07);
            --shadow-lg: 0 6px 24px rgba(60, 40, 20, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font-apple: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-apple);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            padding-bottom: var(--safe-bottom);
            line-height: 1.4;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            min-height: 100dvh;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 截图包裹器 */
        .screenshot-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ===== 顶部标题栏：加强毛玻璃通透感 ===== */
        .header {
            background: linear-gradient(135deg, rgba(100, 200, 130, 0.55) 0%, rgba(70, 170, 100, 0.6) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 18px 16px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(30, 70, 40, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 0 0 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .header-emoji {
            font-size: 1.5rem;
            animation: gentleBounce 2s ease-in-out infinite;
        }
        @keyframes gentleBounce {
            0%,100%{ transform:translateY(0); }
            30%{ transform:translateY(-6px); }
            50%{ transform:translateY(0); }
            70%{ transform:translateY(-3px); }
        }
        .header-title-group {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 0;
        }
        .header-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.8px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            /* 移除了max-width限制，可完整显示10个汉字 */
        }
        .title-edit-btn {
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.5);
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .title-edit-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.4); }
        .title-edit-btn.hidden { display: none; }

        .lock-btn {
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.5);
            color: #fff;
            font-size: 1.2rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .lock-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.4); }
        .lock-btn.unlocked {
            background: rgba(255,220,100,0.45);
            border-color: rgba(255,220,100,0.8);
            animation: unlockPulse 0.6s ease-out;
        }
        @keyframes unlockPulse { 0%{ box-shadow: 0 0 0 0 rgba(255,220,100,0.8); } 100%{ box-shadow: 0 0 0 16px rgba(255,220,100,0); } }
        .edit-mode-badge {
            position: absolute;
            top: -5px; right: -5px;
            background: #ff6b35; color: #fff;
            font-size: 0.55rem; font-weight: 700;
            padding: 2px 6px; border-radius: 8px;
            display: none; white-space: nowrap;
        }
        .lock-btn.unlocked .edit-mode-badge { display: block; }

        /* ===== 主内容区 ===== */
        .main-content {
            flex: 1;
            padding: 14px 14px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 14px;
            box-shadow: var(--shadow);
            border-left: 4px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .section-card.income-card {
            border-left-color: var(--income-border);
            background: linear-gradient(135deg, #fff 60%, var(--income-light) 100%);
        }
        .section-card.expense-card {
            border-left-color: var(--expense-border);
            background: linear-gradient(135deg, #fff 60%, var(--expense-light) 100%);
        }
        .section-card.balance-card {
            border-left-color: var(--balance-border);
            background: linear-gradient(135deg, #fff 60%, var(--balance-light) 100%);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .balance-content {
            flex: 1;
            text-align: center;
        }
        .section-header {
            display: flex; align-items: center; gap: 7px;
            margin-bottom: 10px; font-weight: 700; font-size: 1rem;
        }
        .income-card .section-header { color: var(--income-accent); }
        .expense-card .section-header { color: var(--expense-accent); }
        .balance-card .section-header { color: var(--balance-accent); justify-content: center; font-size: 1.05rem; }

        .records-list { display: flex; flex-direction: column; gap: 6px; }

        .record-row, .placeholder-row {
            display: flex; align-items: center; padding: 8px 10px;
            border-radius: var(--radius-sm); gap: 8px; font-size: 0.9rem;
        }
        .record-row { background: rgba(255,255,255,0.5); }
        .income-card .record-row { background: rgba(255,255,255,0.6); }
        .expense-card .record-row { background: rgba(255,255,255,0.6); }
        .placeholder-row {
            border: 1px dashed rgba(0,0,0,0.1);
            opacity: 0.6;
        }
        .record-date, .placeholder-date {
            flex: 0 0 auto; min-width: 70px; font-weight: 600;
            color: var(--text-secondary); font-size: 0.84rem; white-space: nowrap;
        }
        .placeholder-date { color: #c0b9b0; }
        .record-amount, .placeholder-amount {
            flex: 0 0 auto; min-width: 70px; font-weight: 700;
            font-family: var(--font-apple); font-size: 1.15rem;
            text-align: right; white-space: nowrap; padding-left: 4px;
        }
        .income-card .record-amount { color: var(--income-accent); }
        .expense-card .record-amount { color: var(--expense-accent); }
        .placeholder-amount { color: #c0b9b0; }
        .record-note, .placeholder-note {
            flex: 1 1 auto; color: var(--text-light); font-size: 0.84rem;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            min-width: 40px; margin-left: 10px; padding-left: 4px;
        }
        .placeholder-note { color: #c0b9b0; }
        .record-delete {
            flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%;
            border: none; background: rgba(200,60,40,0.08); color: #c0392b;
            cursor: pointer; font-size: 0.75rem; display: none;
            align-items: center; justify-content: center; flex-shrink: 0;
            opacity: 0.7; margin-left: 4px;
        }
        .edit-mode-active .record-delete { display: flex; }
        .record-row.hide-date .record-date,
        .placeholder-row.hide-date .placeholder-date { visibility: hidden; }

        .subtotal-row {
            display: flex; align-items: center; padding: 10px 10px;
            margin-top: 4px; border-top: 2px dashed rgba(0,0,0,0.08);
            font-weight: 700; gap: 8px; font-size: 0.9rem;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
        }
        .income-card .subtotal-row { color: var(--income-accent); background: rgba(76,175,132,0.06); }
        .expense-card .subtotal-row { color: var(--expense-accent); background: rgba(232,131,107,0.06); }
        .subtotal-label { flex:0 0 auto; min-width:70px; font-size:0.84rem; }
        .subtotal-amount {
            flex:0 0 auto; min-width:70px; font-family:var(--font-apple);
            text-align:right; font-size:1.15rem; padding-left:4px;
        }
        .subtotal-spacer { flex:1 1 auto; min-width:40px; margin-left:10px; }

        .balance-display {
            font-size: 2.4rem; font-weight: 800; font-family: var(--font-apple);
            margin: 6px 0; transition: var(--transition);
        }
        .balance-positive { color: var(--income-accent); }
        .balance-negative { color: var(--expense-accent); }
        .balance-zero { color: var(--text-secondary); }
        .balance-label-text { font-size:0.9rem; color:var(--text-light); font-weight:500; }

        /* 分享小图标（结余右侧） */
        .share-btn-small {
            background: rgba(90, 120, 70, 0.1);
            border: 1.5px solid rgba(90,120,70,0.3);
            color: #5a7a3a;
            font-size: 0.9rem;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition);
            margin-left: 8px;
        }
        .share-btn-small:active { transform: scale(0.9); background: rgba(90,120,70,0.2); }

        /* 底部输入栏 */
        .input-panel {
            background: #fff; border-radius: 20px 20px 0 0;
            padding: 14px 14px calc(14px + var(--safe-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            position: sticky; bottom: 0; z-index: 90;
            display: none; flex-direction: column; gap: 10px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .input-panel.edit-mode-active { display: flex; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        .input-field {
            flex:1; padding:11px 12px; border:2px solid #e8e3db; border-radius:12px;
            font-size:0.9rem; font-family:var(--font-apple); background:#fafaf7;
            color:var(--text); outline:none; transition:var(--transition);
            -webkit-appearance:none; min-width:0;
        }
        .input-field:focus { border-color:#b8a88a; background:#fff; box-shadow:0 0 0 3px rgba(160,140,100,0.1); }
        .date-field { flex:0 0 auto; width:130px; min-width:120px; cursor:pointer; font-weight:500; }
        .amount-field { flex:0 0 auto; width:90px; min-width:80px; text-align:center; font-size:1rem; font-weight:600; }
        .note-field { flex:1 1 auto; min-width:70px; }
        .type-toggle-group { display:flex; gap:6px; flex:0 0 auto; }
        .type-toggle {
            padding:10px 14px; border-radius:20px; border:2px solid #e0dcd5;
            background:#fafaf7; cursor:pointer; font-weight:600; font-size:0.82rem;
            transition:var(--transition); display:flex; align-items:center; gap:4px;
        }
        .type-toggle.selected.income-toggle { background:#e8f5e9; border-color:var(--income-border); color:var(--income-accent); }
        .type-toggle.selected.expense-toggle { background:#fef0ed; border-color:var(--expense-border); color:var(--expense-accent); }
        .submit-btn {
            padding:11px 18px; border-radius:20px; border:none;
            background:linear-gradient(135deg,#5a7a3a,#4a6b2d); color:#fff;
            font-weight:700; font-size:0.9rem; cursor:pointer; white-space:nowrap;
            box-shadow:0 3px 10px rgba(70,100,40,0.25); display:flex; align-items:center; gap:4px;
        }
        .submit-btn:active { transform:scale(0.93); background:#3d5a24; }

        /* 弹窗 */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(30,20,10,0.55); z-index:200;
            display:flex; align-items:center; justify-content:center; padding:20px;
            animation:fadeIn 0.2s; backdrop-filter:blur(2px);
        }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .modal-dialog {
            background:#fff; border-radius:20px; padding:24px 20px;
            width:100%; max-width:360px; text-align:center;
            box-shadow:var(--shadow-lg); animation:slideUp 0.3s;
        }
        @keyframes slideUp { from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;} }
        .modal-title { font-size:1.2rem; font-weight:700; margin-bottom:6px; }
        .modal-subtitle { font-size:0.82rem; color:var(--text-light); margin-bottom:16px; }
        .modal-input {
            width:100%; padding:12px; border:2px solid #e8e3db; border-radius:12px;
            font-size:1rem; text-align:center; background:#fafaf7; outline:none;
        }
        .modal-buttons { display:flex; gap:10px; margin-top:16px; justify-content:center; }
        .modal-btn {
            padding:11px 20px; border-radius:20px; border:none; font-weight:600;
            font-size:0.9rem; cursor:pointer; transition:var(--transition);
        }
        .modal-btn.primary { background:#5a7a3a; color:#fff; }
        .modal-btn.secondary { background:#f0ece5; color:var(--text); }
        .modal-error { color:#e74c3c; font-size:0.78rem; margin-top:8px; display:none; }
        .modal-error.show { display:block; }

        .share-preview-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300;
            display:flex; align-items:center; justify-content:center; padding:20px;
        }
        .share-preview-container { background:white; border-radius:20px; padding:10px; max-width:95vw; max-height:90vh; overflow:auto; }
        .share-preview-container img { width:100%; border-radius:12px; }
        .share-close-btn {
            margin-top:10px; padding:10px 24px; background:rgba(255,255,255,0.2);
            color:white; border:2px solid white; border-radius:25px; font-weight:600; cursor:pointer;
        }

        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            background:#333; color:#fff; padding:10px 20px; border-radius:25px;
            font-size:0.85rem; font-weight:600; z-index:400; pointer-events:none;
            opacity:0; transition:0.3s; box-shadow:0 6px 20px rgba(0,0,0,0.3);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(4px); }
        .toast.success { background:#4caf84; }
        .toast.error { background:#e74c3c; }

        @media (max-width:380px) {
            .header-title { font-size:1.15rem; }
            .record-date { min-width:60px; font-size:0.76rem; }
            .record-amount { min-width:62px; font-size:1rem; }
            .balance-display { font-size:2rem; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- 截图包裹器：包含标题栏和主内容 -->
    <div class="screenshot-wrapper" id="screenshotWrapper">
        <div class="header">
            <span class="header-emoji">🌾</span>
            <div class="header-title-group">
                <span class="header-title" id="headerTitle">砚清舟记账簿</span>
                <button class="title-edit-btn" id="titleEditBtn" title="修改标题">✏️</button>
            </div>
            <button class="lock-btn locked" id="lockBtn">🔒<span class="edit-mode-badge">编辑中</span></button>
        </div>

        <div class="main-content">
            <div class="section-card income-card">
                <div class="section-header"><span class="emoji">💰</span> 收款记录</div>
                <div class="records-list" id="incomeList"></div>
                <div class="subtotal-row">
                    <span class="subtotal-label">📊 小计</span>
                    <span class="subtotal-amount" id="incomeSubtotalAmount">+0</span>
                    <span class="subtotal-spacer"></span>
                </div>
            </div>
            <div class="section-card expense-card">
                <div class="section-header"><span class="emoji">💸</span> 付款记录</div>
                <div class="records-list" id="expenseList"></div>
                <div class="subtotal-row">
                    <span class="subtotal-label">📊 小计</span>
                    <span class="subtotal-amount" id="expenseSubtotalAmount">-0</span>
                    <span class="subtotal-spacer"></span>
                </div>
            </div>
            <div class="section-card balance-card">
                <div class="balance-content">
                    <div class="section-header"><span class="emoji">🏦</span> 当前结余</div>
                    <div class="balance-display balance-zero" id="balanceDisplay">¥0</div>
                    <div class="balance-label-text" id="balanceLabel">收支平衡</div>
                </div>
                <button class="share-btn-small" id="shareBtnSmall" title="生成长图分享">📤</button>
            </div>
        </div>
    </div>

    <!-- 底部输入栏（不参与截图） -->
    <div class="input-panel" id="inputPanel">
        <div class="input-row">
            <input type="date" class="input-field date-field" id="inputDate">
            <input type="number" class="input-field amount-field" id="inputAmount" placeholder="金额" step="0.01" min="0.01" inputmode="decimal">
            <input type="text" class="input-field note-field" id="inputNote" placeholder="备注（选填）" maxlength="30">
        </div>
        <div class="input-row">
            <div class="type-toggle-group">
                <button class="type-toggle income-toggle selected" id="incomeToggle">💰 收入</button>
                <button class="type-toggle expense-toggle" id="expenseToggle">💸 支出</button>
            </div>
            <button class="submit-btn" id="submitBtn">✅ 确认记账</button>
        </div>
    </div>
</div>

<!-- 密码弹窗 -->
<div class="modal-overlay" id="passwordModal" style="display:none;">
    <div class="modal-dialog">
        <div class="modal-title">🔐 编辑权限验证</div>
        <div class="modal-subtitle">默认密码：888888</div>
        <input type="password" class="modal-input" id="passwordInput" placeholder="请输入密码" maxlength="20">
        <div class="modal-error" id="passwordError">❌ 密码错误</div>
        <div class="modal-buttons">
            <button class="modal-btn secondary" id="passwordCancel">取消</button>
            <button class="modal-btn primary" id="passwordConfirm">🔓 验证解锁</button>
        </div>
        <button class="modal-btn secondary" id="changePasswordBtn" style="display:none; margin-top:12px;">⚙️ 修改授权密码</button>
    </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal-overlay" id="changePasswordModal" style="display:none;">
    <div class="modal-dialog">
        <div class="modal-title">⚙️ 修改授权密码</div>
        <input type="password" class="modal-input" id="newPasswordInput" placeholder="新密码" maxlength="20" style="margin-bottom:8px;">
        <input type="password" class="modal-input" id="confirmPasswordInput" placeholder="再次确认">
        <div class="modal-error" id="changePasswordError">❌ 两次密码不一致</div>
        <div class="modal-buttons">
            <button class="modal-btn secondary" id="changePwdCancel">取消</button>
            <button class="modal-btn primary" id="changePwdConfirm">✅ 确认修改</button>
        </div>
    </div>
</div>

<!-- 分享预览弹窗 -->
<div class="share-preview-overlay" id="sharePreview" style="display:none;">
    <div class="share-preview-container">
        <img id="shareImage" src="" alt="分享长图">
        <button class="share-close-btn" id="shareCloseBtn">关闭</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    (function() {
        // DOM 元素
        const headerTitle = document.getElementById('headerTitle');
        const titleEditBtn = document.getElementById('titleEditBtn');
        const lockBtn = document.getElementById('lockBtn');
        const shareBtnSmall = document.getElementById('shareBtnSmall');
        const inputPanel = document.getElementById('inputPanel');
        const incomeList = document.getElementById('incomeList');
        const expenseList = document.getElementById('expenseList');
        const incomeSubtotalAmount = document.getElementById('incomeSubtotalAmount');
        const expenseSubtotalAmount = document.getElementById('expenseSubtotalAmount');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const balanceLabel = document.getElementById('balanceLabel');
        const inputDate = document.getElementById('inputDate');
        const inputAmount = document.getElementById('inputAmount');
        const inputNote = document.getElementById('inputNote');
        const incomeToggle = document.getElementById('incomeToggle');
        const expenseToggle = document.getElementById('expenseToggle');
        const submitBtn = document.getElementById('submitBtn');
        const passwordModal = document.getElementById('passwordModal');
        const passwordInput = document.getElementById('passwordInput');
        const passwordError = document.getElementById('passwordError');
        const passwordConfirm = document.getElementById('passwordConfirm');
        const passwordCancel = document.getElementById('passwordCancel');
        const changePasswordBtn = document.getElementById('changePasswordBtn');
        const changePasswordModal = document.getElementById('changePasswordModal');
        const newPasswordInput = document.getElementById('newPasswordInput');
        const confirmPasswordInput = document.getElementById('confirmPasswordInput');
        const changePasswordError = document.getElementById('changePasswordError');
        const changePwdConfirm = document.getElementById('changePwdConfirm');
        const changePwdCancel = document.getElementById('changePwdCancel');
        const sharePreview = document.getElementById('sharePreview');
        const shareImage = document.getElementById('shareImage');
        const shareCloseBtn = document.getElementById('shareCloseBtn');
        const toast = document.getElementById('toast');
        const screenshotWrapper = document.getElementById('screenshotWrapper');

        // 状态
        const STORAGE_KEY = 'yanqingzhou_finance_v3';
        const DEFAULT888888_PASSWORD = '888888';
        // ⚠️ 部署前务必修改为您自己的 GitHub Pages 链接
        const TOOL_URL = 'https://YanQzhou.github.io/Yan-Journal/';

        let isEditMode = false;
        let selectedType = 'income';
        let records = [];
        let authPassword = DEFAULT_PASSWORD;
        let siteTitle = '砚清舟记账簿';
        let titleLocked = false;
        let toastTimer = null;

        // 数据加载
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    records = data.records || [];
                    authPassword = data.password || DEFAULT_PASSWORD;
                    siteTitle = data.title || '砚清舟记账簿';
                    titleLocked = data.titleLocked === true;
                    if (!authPassword.trim()) authPassword = DEFAULT_PASSWORD;
                } else {
                    records = [];
                    authPassword = DEFAULT_PASSWORD;
                    siteTitle = '砚清舟记账簿';
                    titleLocked = false;
                    saveData();
                }
            } catch (e) {
                records = [];
                authPassword = DEFAULT_PASSWORD;
                siteTitle = '砚清舟记账簿';
                titleLocked = false;
                saveData();
            }
            sortRecords();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                password: authPassword,
                title: siteTitle,
                titleLocked: titleLocked,
                records: records
            }));
        }

        function sortRecords() {
            records.sort((a,b) => a.date.localeCompare(b.date) || a.id - b.id);
        }

        function formatDate(d) {
            const p = d.split('-');
            return parseInt(p[1])+'月'+parseInt(p[2])+'日';
        }
        function formatAmount(a) {
            const n = parseFloat(a);
            return isNaN(n) ? '0' : parseFloat(n.toFixed(2)).toString();
        }
        function escapeHTML(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
        function getTodayStr() {
            const n = new Date();
            return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
        }
        function showToast(msg, type='success') {
            if(toastTimer) clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.className = 'toast '+type+' show';
            toastTimer = setTimeout(()=>{ toast.className='toast'; }, 2000);
        }

        function getIncomeTotal() { return records.filter(r=>r.type==='income').reduce((s,r)=>s+parseFloat(r.amount||0),0); }
        function getExpenseTotal() { return records.filter(r=>r.type==='expense').reduce((s,r)=>s+parseFloat(r.amount||0),0); }
        function getBalance() { return getIncomeTotal() - getExpenseTotal(); }

        // 渲染占位行
        function renderPlaceholderRows(type) {
            const sign = type === 'income' ? '+' : '-';
            return Array(2).fill(null).map(() => `
                <div class="placeholder-row">
                    <span class="placeholder-date">待记录</span>
                    <span class="placeholder-amount">${sign}0</span>
                    <span class="placeholder-note">——</span>
                </div>
            `).join('');
        }

        function renderAll() {
            document.title = siteTitle;
            headerTitle.textContent = siteTitle;
            titleEditBtn.classList.toggle('hidden', titleLocked);
            renderIncomeSection();
            renderExpenseSection();
            renderBalanceSection();
            updateEditModeUI();
        }

        function renderIncomeSection() {
            const incomeRecords = records.filter(r => r.type === 'income');
            if (incomeRecords.length === 0) {
                incomeList.innerHTML = renderPlaceholderRows('income');
            } else {
                let lastDate = null;
                incomeList.innerHTML = incomeRecords.map(r => {
                    const isNewDate = (r.date !== lastDate);
                    const dateText = isNewDate ? formatDate(r.date) : '';
                    const hideClass = isNewDate ? '' : ' hide-date';
                    lastDate = r.date;
                    return `<div class="record-row${hideClass}" data-id="${r.id}">
                                <span class="record-date">${dateText}</span>
                                <span class="record-amount">+${formatAmount(r.amount)}</span>
                                <span class="record-note">${escapeHTML(r.note || '')}</span>
                                <button class="record-delete" data-id="${r.id}">🗑️</button>
                            </div>`;
                }).join('');
            }
            incomeSubtotalAmount.textContent = '+' + formatAmount(getIncomeTotal());
        }

        function renderExpenseSection() {
            const expenseRecords = records.filter(r => r.type === 'expense');
            if (expenseRecords.length === 0) {
                expenseList.innerHTML = renderPlaceholderRows('expense');
            } else {
                let lastDate = null;
                expenseList.innerHTML = expenseRecords.map(r => {
                    const isNewDate = (r.date !== lastDate);
                    const dateText = isNewDate ? formatDate(r.date) : '';
                    const hideClass = isNewDate ? '' : ' hide-date';
                    lastDate = r.date;
                    return `<div class="record-row${hideClass}" data-id="${r.id}">
                                <span class="record-date">${dateText}</span>
                                <span class="record-amount">-${formatAmount(r.amount)}</span>
                                <span class="record-note">${escapeHTML(r.note || '')}</span>
                                <button class="record-delete" data-id="${r.id}">🗑️</button>
                            </div>`;
                }).join('');
            }
            expenseSubtotalAmount.textContent = '-' + formatAmount(getExpenseTotal());
        }

        function renderBalanceSection() {
            const balance = getBalance();
            const formatted = formatAmount(Math.abs(balance));
            if (balance > 0) {
                balanceDisplay.textContent = '¥' + formatted;
                balanceDisplay.className = 'balance-display balance-positive';
                balanceLabel.textContent = '✅ 盈余';
            } else if (balance < 0) {
                balanceDisplay.textContent = '-¥' + formatted;
                balanceDisplay.className = 'balance-display balance-negative';
                balanceLabel.textContent = '⚠️ 亏损';
            } else {
                balanceDisplay.textContent = '¥0';
                balanceDisplay.className = 'balance-display balance-zero';
                balanceLabel.textContent = '➖ 收支平衡';
            }
        }

        function updateEditModeUI() {
            if (isEditMode) {
                document.getElementById('appContainer').classList.add('edit-mode-active');
                inputPanel.classList.add('edit-mode-active');
                lockBtn.classList.add('unlocked');
                lockBtn.innerHTML = '🔓<span class="edit-mode-badge">编辑中</span>';
                changePasswordBtn.style.display = 'inline-block';
            } else {
                document.getElementById('appContainer').classList.remove('edit-mode-active');
                inputPanel.classList.remove('edit-mode-active');
                lockBtn.classList.remove('unlocked');
                lockBtn.innerHTML = '🔒<span class="edit-mode-badge">编辑中</span>';
                changePasswordBtn.style.display = 'none';
            }
        }

        function setEditMode(enabled) {
            isEditMode = enabled;
            updateEditModeUI();
            if (!enabled) {
                passwordModal.style.display = 'none';
                changePasswordModal.style.display = 'none';
                passwordInput.value = '';
                passwordError.classList.remove('show');
            }
            renderAll();
        }

        // 标题编辑（仅首次）
        function handleTitleEdit() {
            if (titleLocked) {
                showToast('标题已锁定，不可修改', 'error');
                return;
            }
            const newTitle = prompt('请输入新标题（最长15个字）', siteTitle);
            if (newTitle !== null) {
                const trimmed = newTitle.trim();
                if (trimmed.length === 0) {
                    showToast('标题不能为空', 'error');
                    return;
                }
                if (trimmed.length > 15) {
                    showToast('标题最多15个字', 'error');
                    return;
                }
                siteTitle = trimmed;
                titleLocked = true;
                saveData();
                renderAll();
                showToast('✅ 标题已更新并锁定', 'success');
            }
        }

        // 锁定/解锁
        function showPasswordModal() {
            passwordInput.value = '';
            passwordError.classList.remove('show');
            passwordModal.style.display = 'flex';
            setTimeout(() => passwordInput.focus(), 150);
        }
        function hidePasswordModal() {
            passwordModal.style.display = 'none';
            passwordInput.value = '';
            passwordError.classList.remove('show');
        }
        function handleUnlock() {
            if (passwordInput.value.trim() === authPassword) {
                hidePasswordModal();
                setEditMode(true);
                showToast('✅ 已解锁，可以编辑记录', 'success');
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
                if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            }
        }
        function handleLock() {
            if (isEditMode) {
                setEditMode(false);
                showToast('🔒 已锁定，进入查看模式', 'success');
            }
        }

        // 修改密码
        function showChangePasswordModal() {
            newPasswordInput.value = '';
            confirmPasswordInput.value = '';
            changePasswordError.classList.remove('show');
            changePasswordModal.style.display = 'flex';
            setTimeout(() => newPasswordInput.focus(), 150);
        }
        function hideChangePasswordModal() {
            changePasswordModal.style.display = 'none';
        }
        function handleChangePassword() {
            const p1 = newPasswordInput.value.trim();
            const p2 = confirmPasswordInput.value.trim();
            if (!p1) { changePasswordError.textContent='❌ 密码不能为空'; changePasswordError.classList.add('show'); return; }
            if (p1 !== p2) { changePasswordError.textContent='❌ 两次密码不一致'; changePasswordError.classList.add('show'); return; }
            if (p1.length > 20) { changePasswordError.textContent='❌ 密码最长20位'; changePasswordError.classList.add('show'); return; }
            authPassword = p1;
            saveData();
            hideChangePasswordModal();
            showToast('✅ 授权密码已更新', 'success');
        }

        // 添加记录
        function addRecord() {
            if (!isEditMode) {
                showToast('🔒 请先解锁编辑权限', 'error');
                return;
            }
            const dateVal = inputDate.value.trim();
            const amountVal = inputAmount.value.trim();
            const noteVal = inputNote.value.trim();
            if (!dateVal) { showToast('⚠️ 请选择日期', 'error'); return; }
            if (!amountVal) { showToast('⚠️ 请输入金额', 'error'); return; }
            const amt = parseFloat(amountVal);
            if (isNaN(amt) || amt <= 0) { showToast('⚠️ 金额必须大于0', 'error'); return; }
            if (amt > 99999999.99) { showToast('⚠️ 金额超出范围', 'error'); return; }
            const maxId = records.length > 0 ? Math.max(...records.map(r => r.id)) : 0;
            records.push({
                id: maxId + 1,
                date: dateVal,
                amount: Math.round(amt * 100) / 100,
                type: selectedType,
                note: noteVal.substring(0, 30),
            });
            sortRecords();
            saveData();
            renderAll();
            inputAmount.value = '';
            inputNote.value = '';
            inputDate.value = getTodayStr();
            showToast(`✅ 已记录${selectedType==='income'?'收入':'支出'}`, 'success');
        }

        // 删除记录
        function deleteRecord(id) {
            if (!isEditMode) return;
            const rec = records.find(r => r.id === id);
            if (!rec) return;
            if (confirm(`确定删除此条记录吗？\n${formatDate(rec.date)}  ${rec.type==='income'?'+':'-'}${formatAmount(rec.amount)}\n${rec.note||'无备注'}`)) {
                records = records.filter(r => r.id !== id);
                saveData();
                renderAll();
                showToast('🗑️ 已删除', 'success');
            }
        }

        // 类型切换
        function setSelectedType(type) {
            selectedType = type;
            incomeToggle.classList.toggle('selected', type === 'income');
            expenseToggle.classList.toggle('selected', type === 'expense');
        }

        // 生成分享长图（包含标题栏）
        async function generateShareImage() {
            showToast('正在生成分享图片...', 'success');
            try {
                const canvas = await html2canvas(screenshotWrapper, {
                    backgroundColor: '#f5f2ed',
                    scale: 2,
                    useCORS: true,
                    logging: false
                });
                const qrSize = 120, pad = 20;
                const finalCanvas = document.createElement('canvas');
                const ctx = finalCanvas.getContext('2d');
                const w = canvas.width, h = canvas.height;
                finalCanvas.width = w;
                finalCanvas.height = h + qrSize + pad*2;
                ctx.fillStyle = '#f5f2ed';
                ctx.fillRect(0,0,w,finalCanvas.height);
                ctx.drawImage(canvas,0,0);
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${qrSize}x${qrSize}&data=${encodeURIComponent(TOOL_URL)}`;
                const qrImg = new Image();
                qrImg.crossOrigin = 'anonymous';
                await new Promise((resolve, reject) => { qrImg.onload=resolve; qrImg.onerror=reject; qrImg.src=qrUrl; });
                const qrX = (w - qrSize)/2, qrY = h + pad;
                ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
                ctx.font = 'bold 28px -apple-system, "PingFang SC", sans-serif';
                ctx.fillStyle = '#5a7a3a';
                ctx.textAlign = 'center';
                ctx.fillText('扫码打开记账工具', w/2, qrY-12);
                shareImage.src = finalCanvas.toDataURL('image/png');
                sharePreview.style.display = 'flex';
                showToast('✅ 长按图片即可保存分享', 'success');
            } catch (e) {
                showToast('❌ 生成失败，请重试', 'error');
            }
        }

        // 事件绑定
        titleEditBtn.addEventListener('click', handleTitleEdit);
        lockBtn.addEventListener('click', () => isEditMode ? handleLock() : showPasswordModal());
        shareBtnSmall.addEventListener('click', generateShareImage);
        shareCloseBtn.addEventListener('click', () => sharePreview.style.display = 'none');
        sharePreview.addEventListener('click', (e) => { if (e.target===sharePreview) sharePreview.style.display='none'; });

        passwordConfirm.addEventListener('click', handleUnlock);
        passwordCancel.addEventListener('click', hidePasswordModal);
        passwordInput.addEventListener('keydown', (e) => { if (e.key==='Enter') { e.preventDefault(); handleUnlock(); } });
        passwordModal.addEventListener('click', (e) => { if (e.target===passwordModal) hidePasswordModal(); });
        changePasswordModal.addEventListener('click', (e) => { if (e.target===changePasswordModal) hideChangePasswordModal(); });

        changePasswordBtn.addEventListener('click', showChangePasswordModal);
        changePwdConfirm.addEventListener('click', handleChangePassword);
        changePwdCancel.addEventListener('click', hideChangePasswordModal);
        confirmPasswordInput.addEventListener('keydown', (e) => { if (e.key==='Enter') { e.preventDefault(); handleChangePassword(); } });
        newPasswordInput.addEventListener('keydown', (e) => { if (e.key==='Enter') { e.preventDefault(); confirmPasswordInput.focus(); } });

        incomeToggle.addEventListener('click', () => setSelectedType('income'));
        expenseToggle.addEventListener('click', () => setSelectedType('expense'));
        submitBtn.addEventListener('click', addRecord);
        inputAmount.addEventListener('keydown', (e) => { if (e.key==='Enter') { e.preventDefault(); addRecord(); } });
        inputNote.addEventListener('keydown', (e) => { if (e.key==='Enter') { e.preventDefault(); addRecord(); } });

        document.addEventListener('click', (e) => {
            const delBtn = e.target.closest('.record-delete');
            if (delBtn && isEditMode) {
                e.stopPropagation();
                const id = parseInt(delBtn.getAttribute('data-id'), 10);
                if (!isNaN(id)) deleteRecord(id);
            }
        });

        lockBtn.addEventListener('dblclick', (e) => { if (isEditMode) { e.preventDefault(); handleLock(); } });

        // 初始化
        function init() {
            loadData();
            inputDate.value = getTodayStr();
            inputDate.setAttribute('max', '2099-12-31');
            inputDate.setAttribute('min', '2020-01-01');
            setSelectedType('income');
            setEditMode(false);
            renderAll();
            passwordModal.style.display = 'none';
            changePasswordModal.style.display = 'none';
            sharePreview.style.display = 'none';
            if (TOOL_URL.includes('你的用户名')) {
                console.warn('⚠️ 请将代码中的 TOOL_URL 替换为您的 GitHub Pages 实际链接');
            }
        }
        init();
    })();
</script>
</body>
</html>
